# =============================================================================
#  Render.com blueprint for the SinWeave product site
#  ---------------------------------------------------------------------------
#  This is a pure static site. No build step. No Node. No Docker.
#  Commit this file, point Render at the repo, and you're live.
#
#  Deploy via Blueprint:
#    1. Push the repo to GitHub (main branch).
#    2. In Render → "New +" → "Blueprint".
#    3. Select your fork of the repo. Render reads THIS file and wires it up.
#    4. Click "Apply". First deploy takes ~30s.
#
#  Or deploy manually (no blueprint needed):
#    Render → "New +" → "Static Site"
#      Repository       : your fork of egzothicki/void
#      Branch           : main
#      Root Directory   : website
#      Build Command    : (leave empty)
#      Publish Directory: .
#      Auto-Deploy      : Yes
# =============================================================================

services:
  - type: web
    runtime: static
    name: sinweave-site
    # `rootDir` means Render only cares about the website/ folder. Changes
    # outside of it won't trigger redeploys.
    rootDir: website
    # No build. The folder is already deployable as-is.
    buildCommand: ""
    # Publish the same directory (relative to rootDir).
    staticPublishPath: .
    # Static sites on Render are free by default — no `plan` field needed.
    # (The `free` plan name was retired for dynamic services.)
    # Redeploy only when files inside website/ change.
    autoDeploy: true
    buildFilter:
      paths:
        - website/**
    # SPA-style rewrite disabled — this is a multi-file static site (well, one
    # for now, but keeping the door open). We do add 404 → index so unknown
    # paths don't feel broken.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    headers:
      # Cache assets aggressively; HTML is cheap and should revalidate.
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*.css
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*.js
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*.html
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      # Decent default security headers for a static marketing site.
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: interest-cohort=()
