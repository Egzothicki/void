name: Build & Release macOS

on:
  push:
    tags:
      - 'v*'           # trigger on any version tag: v1.4.11, v1.5.0, etc.
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: macos-14        # Apple Silicon M1 — fastest free macOS runner
    timeout-minutes: 360     # 6 hour cap (build typically takes ~5.5 hrs)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build React bundle
        run: cd src/vs/workbench/contrib/void/browser/react && node build.js

      - name: Build app (minified)
        run: npm run gulp -- vscode-darwin-arm64-min
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Zip app for Squirrel updates
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            ../VSCode-darwin-arm64/SinWeave.app \
            ../SinWeave-darwin-arm64.zip

      - name: Create DMG
        run: |
          STAGING="../.sinweave-dmg-staging"
          DMG="../SinWeave-darwin-arm64.dmg"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          cp -R ../VSCode-darwin-arm64/SinWeave.app "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create \
            -volname "SinWeave" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            -imagekey zlib-level=9 \
            "$DMG" > /dev/null
          rm -rf "$STAGING"

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            ../SinWeave-darwin-arm64.dmg \
            ../SinWeave-darwin-arm64.zip \
            --title "SinWeave ${TAG}" \
            --notes "macOS Apple Silicon build." \
            --repo "$GITHUB_REPOSITORY" || \
          gh release upload "$TAG" \
            ../SinWeave-darwin-arm64.dmg \
            ../SinWeave-darwin-arm64.zip \
            --repo "$GITHUB_REPOSITORY"
